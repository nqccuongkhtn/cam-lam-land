# Cam Lâm GIS + Real Estate platform — one-command local stack.
#   cp .env.example .env && docker compose up --build
# Then open http://localhost  (map loads on Cam Lâm, Khánh Hòa)
services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: camlam_postgis
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-camlam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-camlam_secret_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-camlam_gis}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      # host:container — 5433 on the host avoids clashing with a local Postgres on 5432
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-camlam} -d ${POSTGRES_DB:-camlam_gis}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: camlam_backend
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgis
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-camlam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-camlam_secret_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-camlam_gis}
      BACKEND_PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-please_change_this_to_a_long_random_string}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@camlam.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin12345}
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgis:
        condition: service_healthy
    expose:
      - "4000"

  gis-worker:
    build:
      context: .
      dockerfile: apps/gis-worker/Dockerfile
    container_name: camlam_gis_worker
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgis
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-camlam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-camlam_secret_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-camlam_gis}
      UPLOAD_DIR: /data/uploads
      WORKER_POLL_MS: ${WORKER_POLL_MS:-4000}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
    volumes:
      - uploads:/data/uploads
      - ./data/cam-lam:/data/cam-lam:ro
    depends_on:
      postgis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: camlam_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-/api}
      NEXT_PUBLIC_MAP_CENTER_LNG: ${NEXT_PUBLIC_MAP_CENTER_LNG:-109.0917}
      NEXT_PUBLIC_MAP_CENTER_LAT: ${NEXT_PUBLIC_MAP_CENTER_LAT:-12.0771}
      NEXT_PUBLIC_MAP_ZOOM: ${NEXT_PUBLIC_MAP_ZOOM:-12}
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: camlam_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  uploads:
