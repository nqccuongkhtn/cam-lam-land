# Reverse proxy: / -> Next.js frontend, /api -> backend API.
upstream frontend_upstream { server frontend:3000; }
upstream backend_upstream  { server backend:4000;  }

server {
    listen 80;
    server_name _;
    client_max_body_size 200m;   # allow large GIS file uploads (.dgn/.shp/.zip)

    # API
    location /api/ {
        proxy_pass         http://backend_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # WebSocket endpoint for live map updates (optional feature)
    location /ws {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # Frontend (Next.js) — also handles HMR websocket in dev
    location / {
        proxy_pass         http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
